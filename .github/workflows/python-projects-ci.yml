name: Python Projects CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - 01_document_diff_analysis
          - 02_dependency_auditor
          - 03_openapi_to_sdk
          - 04_sql_dump_query_engine
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            ${{ matrix.project }}/pyproject.toml

      - name: Detect Python project
        id: detect
        shell: bash
        run: |
          if [[ -f pyproject.toml ]]; then
            echo "has_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_project=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.detect.outputs.has_project == 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [[ -f pyproject.toml ]]; then
            python -m pip install ".[dev]" || python -m pip install .
          fi

      - name: Run lint
        if: steps.detect.outputs.has_project == 'true'
        shell: bash
        run: |
          if python -m ruff --version >/dev/null 2>&1; then
            python -m ruff check .
          elif python -m flake8 --version >/dev/null 2>&1; then
            python -m flake8 .
          else
            echo "No supported linter installed for ${PWD} (expected ruff or flake8)."
            exit 1
          fi

      - name: Skip lint (no project files)
        if: steps.detect.outputs.has_project != 'true'
        run: echo "Skipping lint for ${{ matrix.project }} because no Python project files were found."

  test:
    name: Test (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - 01_document_diff_analysis
          - 02_dependency_auditor
          - 03_openapi_to_sdk
          - 04_sql_dump_query_engine
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            ${{ matrix.project }}/pyproject.toml

      - name: Detect Python project
        id: detect
        shell: bash
        run: |
          if [[ -f pyproject.toml ]]; then
            echo "has_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_project=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.detect.outputs.has_project == 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [[ -f pyproject.toml ]]; then
            python -m pip install ".[dev]" || python -m pip install .
          fi

      - name: Run tests
        if: steps.detect.outputs.has_project == 'true'
        shell: bash
        run: |
          if python -m pytest --version >/dev/null 2>&1; then
            python -m pytest
          else
            echo "pytest is not installed for ${PWD}."
            exit 1
          fi

      - name: Skip tests (no project files)
        if: steps.detect.outputs.has_project != 'true'
        run: echo "Skipping tests for ${{ matrix.project }} because no Python project files were found."
